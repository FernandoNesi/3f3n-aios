<!--
  3F3N Tracking — Snippet de Inicialização (production-ready v3.0.0)
  Cole no <head> de capturaA.html / capturaB.html / capturaC.html.

  ⚠️  Única linha que muda entre landings:

       initTracking({ page: 'capturaA' });
-->

<!-- 1. Consent Mode v2 (síncrono, antes de tudo) -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('consent', 'default', {
    ad_storage: 'denied', analytics_storage: 'denied',
    ad_user_data: 'denied', ad_personalization: 'denied',
    wait_for_update: 500
  });
</script>

<!-- 2. Variáveis do build (.env → __ENV__) -->
<script>
  window.__ENV__ = {
    GA4_ID:      '%VITE_GA4_ID%',
    PIXEL_ID:    '%VITE_PIXEL_ID%',
    WEBHOOK_URL: '%VITE_WEBHOOK_URL%',
    UTM_TTL_DAYS: 30
  };
</script>

<!-- 3. GA4 base -->
<script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA4_ID%"></script>
<script>
  gtag('js', new Date());
  gtag('config', window.__ENV__.GA4_ID, { send_page_view: false });
</script>

<!-- 4. Meta Pixel base -->
<script>
  !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
  n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
  document,'script','https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', window.__ENV__.PIXEL_ID);
</script>

<!-- 5. Tracking Core 3F3N -->
<script defer src="/js/tracking-core.js"></script>

<!-- 6. ÚNICA LINHA DE BOOTSTRAP — mudar só o `page` em cada landing -->
<script>
  window.addEventListener('load', function () {
    initTracking({ page: 'capturaA' });
  });
</script>
