<!--
  3F3N Tracking — Snippet Padrão de Inicialização
  Cole no <head> de capturaA.html / capturaB.html / capturaC.html
  Trocando APENAS o valor de `page_variation`.
-->

<!-- 1. Consent Mode v2 (síncrono — antes de qualquer pixel) -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('consent', 'default', {
    'ad_storage':       'denied',
    'analytics_storage':'denied',
    'ad_user_data':     'denied',
    'ad_personalization':'denied',
    'wait_for_update':  500
  });
</script>

<!-- 2. Env vars injetadas pelo build (Vite/Next/etc) -->
<script>
  window.__ENV__ = {
    GA4_ID:      '%VITE_GA4_ID%',
    PIXEL_ID:    '%VITE_PIXEL_ID%',
    WEBHOOK_URL: '%VITE_WEBHOOK_URL%'
  };
</script>

<!-- 3. GA4 base (async) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA4_ID%"></script>
<script>
  gtag('js', new Date());
  gtag('config', window.__ENV__.GA4_ID, { send_page_view: false });
</script>

<!-- 4. Meta Pixel base (async, injetado pelo snippet) -->
<script>
  !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
  n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
  document,'script','https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', window.__ENV__.PIXEL_ID);
</script>

<!-- 5. Tracking Core 3F3N (defer) -->
<script defer src="/js/tracking-core.js"></script>

<!-- 6. Bootstrap — única coisa que muda entre capturaA/B/C: page_variation -->
<script>
  window.addEventListener('load', function () {
    Tracking3F3N.init({
      ga4_id:         window.__ENV__.GA4_ID,
      pixel_id:       window.__ENV__.PIXEL_ID,
      webhook_url:    window.__ENV__.WEBHOOK_URL,
      page_variation: 'capturaA', // ← TROCAR POR PÁGINA: capturaA | capturaB | capturaC
      ttl_days:       30
    });

    // Page view com dedup (não dispara 2× em SPAs que re-executam o handler)
    Tracking3F3N.track('page_view', {}, { once: true });
  });
</script>
